<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Classifier — Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border: 3px solid #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #000;
            color: #fff;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 3px solid #000;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            letter-spacing: 1px;
            font-style: italic;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #000;
            background: #f9f9f9;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f9f9f9;
            font-family: 'Georgia', serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-right: 1px solid #ddd;
            transition: all 0.3s;
        }

        .tab-button:last-child {
            border-right: none;
        }

        .tab-button.active {
            background: #000;
            color: white;
            border-bottom: 3px solid #fff;
        }

        .tab-button:hover:not(.active) {
            background: #eee;
        }

        .tab-content {
            display: none;
            padding: 40px 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #999;
            font-family: 'Georgia', serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: white;
            border: none;
            font-family: 'Georgia', serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button.submit-btn:hover {
            background: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .error {
            background: #ffe6e6;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #cc0000;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #e6ffe6;
            border: 1px solid #00cc00;
            color: #00aa00;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #00cc00;
            display: none;
        }

        .success.show {
            display: block;
        }

        .divider {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin: 20px 0;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #000;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #000;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: #000;
            color: white;
            padding: 2px 4px;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>THE CLASSIFIER</h1>
            <p>News Intelligence & Authentication</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('login')">Login</button>
            <button class="tab-button" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <div id="login-error" class="error"></div>
            <div id="login-success" class="success"></div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required>
                </div>

                <div class="loader" id="login-loader">
                    <div class="spinner"></div>
                </div>

                <button type="submit" class="submit-btn" id="login-submit">Sign In</button>
            </form>

            <div class="back-link">
                <a href="/">← Back to Classifier</a>
            </div>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <div id="register-error" class="error"></div>
            <div id="register-success" class="success"></div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" 
                           minlength="3" maxlength="50" required 
                           placeholder="3-50 characters">
                </div>

                <div class="form-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" 
                           minlength="8" required 
                           placeholder="Minimum 8 characters">
                </div>

                <div class="form-group">
                    <label for="register-password-confirm">Confirm Password</label>
                    <input type="password" id="register-password-confirm" name="password-confirm" 
                           required placeholder="Repeat your password">
                </div>

                <div class="loader" id="register-loader">
                    <div class="spinner"></div>
                </div>

                <button type="submit" class="submit-btn" id="register-submit">Create Account</button>
            </form>

            <div class="back-link">
                <a href="/">← Back to Classifier</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = location.origin;

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            // Clear messages
            clearMessages();
        }

        function clearMessages() {
            document.querySelectorAll('.error, .success').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }

        function showError(message, tab) {
            const errorEl = document.getElementById(`${tab}-error`);
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function showSuccess(message, tab) {
            const successEl = document.getElementById(`${tab}-success`);
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        function setLoading(tab, isLoading) {
            const loader = document.getElementById(`${tab}-loader`);
            const button = document.getElementById(`${tab}-submit`);
            if (isLoading) {
                loader.style.display = 'block';
                button.disabled = true;
                button.style.opacity = '0.6';
            } else {
                loader.style.display = 'none';
                button.disabled = false;
                button.style.opacity = '1';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            clearMessages();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            setLoading('login', true);

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch(`${API_BASE}/auth/token`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || 'Login failed', 'login');
                    setLoading('login', false);
                    return;
                }

                // Store token (used by script.js for Authorization header)
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('token_type', data.token_type);

                showSuccess('Login successful! Redirecting...', 'login');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                showError('Connection error: ' + error.message, 'login');
                setLoading('login', false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            clearMessages();

            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;

            // Validate password match
            if (password !== passwordConfirm) {
                showError('Passwords do not match', 'register');
                return;
            }

            setLoading('register', true);

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || 'Registration failed', 'register');
                    setLoading('register', false);
                    return;
                }

                showSuccess('Account created successfully! Redirecting to login...', 'register');
                
                // Clear form
                document.getElementById('register-form').reset();
                
                // Switch to login tab after 2 seconds
                setTimeout(() => {
                    document.getElementById('login-username').focus();
                    showSuccess('Account created! Log in with your credentials.', 'login');
                }, 2000);
            } catch (error) {
                showError('Connection error: ' + error.message, 'register');
                setLoading('register', false);
            }
        }

        // Auto-login on page load if token exists
        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                // If already logged in, redirect to home
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
